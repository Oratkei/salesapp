<!DOCTYPE html>

<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>遠興 営業支援</title>
<link href="./enkou_app_files/css2" rel="stylesheet">
<style>
:root {
  --bg:#f0ece4; --surface:#fff; --s2:#f5f2ed; --s3:#edeae3;
  --border:#e0dbd0; --border2:#ccc8be;
  --text:#1c1a16; --text2:#6b6760; --text3:#a8a49d;
  --gold:#f0ce6a;
  --blue:#1d5fa8; --bluebg:#e8f2fb;
  --green:#1a7a4a; --greenbg:#e4f5ed;
  --purple:#6b3fb5; --purplebg:#f0e8fb;
  --amber:#b07010; --amberbg:#fdf4e0;
  --red:#c0392b; --redbg:#fff1f0; --reds:#fde0de;
  --sh:0 1px 4px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  --sh2:0 3px 10px rgba(0,0,0,.1),0 8px 28px rgba(0,0,0,.08);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--text);color:#fff;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;position:sticky;top:0;z-index:200;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.12em;color:var(--gold);}
.logo-sub{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:.06em;margin-left:8px;}
.hbtn{background:rgba(255,255,255,.12);border:none;color:#fff;border-radius:6px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-shrink:0;}
.tab-btn{flex:1;padding:10px 4px;font-size:11px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;font-family:'Noto Sans JP',sans-serif;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab-btn .ti{font-size:16px;}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);}
.tab-btn .badge{font-size:9px;background:#e74c3c;color:#fff;border-radius:8px;padding:1px 5px;font-weight:700;}
.page{display:none;flex:1;flex-direction:column;overflow:hidden;}
.page.active{display:flex;}

/* TASK */
.capture-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 12px;flex-shrink:0;}
.capture-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.08em;margin-bottom:7px;}
.src-buttons{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.sb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;border-radius:10px;border:1.5px solid transparent;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;}
.sb:active{transform:scale(.93);}
.sb .si{font-size:17px;line-height:1;}
.sb .sn{font-size:9px;font-weight:700;}
.sb.tel{background:var(--bluebg);border-color:rgba(29,95,168,.2);}.sb.tel .sn{color:var(--blue);}
.sb.mail{background:var(--purplebg);border-color:rgba(107,63,181,.2);}.sb.mail .sn{color:var(--purple);}
.sb.visit{background:var(--greenbg);border-color:rgba(26,122,74,.2);}.sb.visit .sn{color:var(--green);}
.sb.ins{background:var(--amberbg);border-color:rgba(176,112,16,.2);}.sb.ins .sn{color:var(--amber);}
.sb.self{background:var(--s3);border-color:rgba(107,103,96,.2);}.sb.self .sn{color:var(--text2);}

/* KANBAN */
.kanban-wrap{flex:1;overflow-x:auto;padding:10px;display:flex;gap:8px;min-height:0;}
.kanban-col{flex-shrink:0;width:210px;display:flex;flex-direction:column;border-radius:12px;overflow:hidden;box-shadow:var(--sh);}
.kcol-todo    {background:#fff8f6;}
.kcol-doing   {background:#f0f7ff;}
.kcol-maker   {background:#fffdf0;}
.kcol-customer{background:#f0fff8;}
.khead{padding:9px 11px 7px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.khead-left{display:flex;align-items:center;gap:6px;}
.kdot{width:8px;height:8px;border-radius:50%;}
.kcol-todo     .kdot{background:#e74c3c;}
.kcol-doing    .kdot{background:#1d5fa8;}
.kcol-maker    .kdot{background:#b07010;}
.kcol-customer .kdot{background:#1a7a4a;}
.kname{font-size:11px;font-weight:700;line-height:1.2;}
.kcol-todo     .kname{color:#c0392b;}
.kcol-doing    .kname{color:#1d5fa8;}
.kcol-maker    .kname{color:#b07010;}
.kcol-customer .kname{color:#1a7a4a;}
.kcnt{font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;background:rgba(0,0,0,.07);}
.kcol-todo     .kcnt{color:#c0392b;}
.kcol-doing    .kcnt{color:#1d5fa8;}
.kcol-maker    .kcnt{color:#b07010;}
.kcol-customer .kcnt{color:#1a7a4a;}
.kbody{flex:1;overflow-y:auto;padding:0 7px 10px;display:flex;flex-direction:column;gap:6px;scrollbar-width:thin;}
.kempty{text-align:center;padding:16px;font-size:11px;color:var(--text3);border:1.5px dashed var(--border2);border-radius:8px;}
.more-btn{width:100%;padding:7px;border-radius:8px;border:1.5px dashed var(--border2);background:transparent;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;margin-top:2px;}
.more-btn:hover{background:var(--s2);border-color:var(--border2);}
.done-toggle{width:100%;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:var(--s2);font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;font-family:'Noto Sans JP',sans-serif;display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
.done-toggle:hover{background:var(--s3);}
.done-section{display:none;margin-top:4px;padding-top:4px;border-top:1px dashed var(--border);}
.done-section.open{display:flex;flex-direction:column;gap:6px;}
.tcard.done{opacity:.45;}
.tcard.done .tct{text-decoration:line-through;color:var(--text2);}
.tcard[draggable="true"]{cursor:grab;}
.tcard[draggable="true"]:active{cursor:grabbing;}
.tcard.dragging{opacity:.4;transform:scale(.97);}
.kanban-col.drag-over .kbody{background:rgba(0,0,0,.04);border-radius:8px;}

/* TASK CARD */
.tcard{background:var(--surface);border-radius:8px;padding:9px 10px;cursor:pointer;border:1px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.05);transition:all .15s;}
.tcard:hover{box-shadow:var(--sh2);transform:translateY(-1px);border-color:var(--border);}
.tcard.done{opacity:.4;}
.tcard.done .tct{text-decoration:line-through;color:var(--text2);}
.tr1{display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;}
.tbadge{font-size:12px;flex-shrink:0;margin-top:1px;width:16px;text-align:center;}
.tct{font-size:12px;font-weight:500;line-height:1.4;flex:1;}
.tchk{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.tchk:hover{border-color:#2ecc71;}
.tcard.done .tchk{background:#2ecc71;border-color:#2ecc71;}
.chki{display:none;}.tcard.done .chki{display:block;}
.tr2{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.ctag{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;}
.ctag-tel{background:var(--bluebg);color:var(--blue);}
.ctag-mail{background:var(--purplebg);color:var(--purple);}
.ctag-visit{background:var(--greenbg);color:var(--green);}
.ctag-ins{background:var(--amberbg);color:var(--amber);}
.ctag-self{background:var(--s3);color:var(--text2);}
.ccust{font-size:9px;color:var(--text3);background:rgba(0,0,0,.05);padding:1px 5px;border-radius:3px;}
.cdue{font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;margin-left:auto;background:var(--s2);color:var(--text3);}
.cdue.ov{background:var(--reds);color:var(--red);}
.cdue.td{background:var(--amberbg);color:var(--amber);}
.spb{display:flex;align-items:center;gap:5px;margin-top:4px;}
.spbw{flex:1;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.spbf{height:100%;border-radius:1px;background:#2ecc71;transition:width .3s;}
.spbf.pt{background:var(--amber);}
.spbc{font-size:9px;font-weight:700;color:var(--text3);}
.spbc.al{color:#2ecc71;}
.status-move{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;}
.smv{font-size:9px;font-weight:700;padding:3px 5px;border-radius:5px;border:1px solid var(--border);cursor:pointer;font-family:'Noto Sans JP',sans-serif;background:var(--s2);color:var(--text2);transition:all .15s;}
.smv:hover{opacity:.8;}
.smv.active-st{opacity:.35;cursor:default;pointer-events:none;}

/* SCHEDULE */
.sched-page{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.week-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.week-label{font-size:13px;font-weight:700;}
.nav-btn{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-weight:700;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);flex-shrink:0;}
.wday{background:var(--surface);padding:6px 4px;cursor:pointer;}
.wday-name{font-size:9px;font-weight:700;text-align:center;color:var(--text3);margin-bottom:2px;}
.wday-num{font-size:14px;font-weight:700;text-align:center;margin-bottom:4px;}
.wday.today .wday-num{color:var(--blue);}
.wday-circle{background:var(--blue);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;font-size:13px;font-weight:700;}
.wday-events{display:flex;flex-direction:column;gap:2px;}
.wday-evt{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.wday-evt.visit{background:var(--greenbg);color:var(--green);}
.wday-evt.tel{background:var(--purplebg);color:var(--purple);}
.wday-evt.gcal{background:var(--bluebg);color:var(--blue);}
.wday-evt.more{background:var(--s3);color:var(--text2);}
.day-detail{flex:1;overflow-y:auto;padding:12px;}
.day-detail-title{font-size:13px;font-weight:700;margin-bottom:10px;color:var(--text2);}
.apo-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;}
.apo-item{background:var(--surface);border-radius:8px;padding:9px 11px;border-left:3px solid var(--blue);box-shadow:var(--sh);}
.apo-item.visit-apo{border-left-color:var(--green);}
.apo-item.tel-apo{border-left-color:var(--purple);}
.apo-time{font-size:10px;font-weight:700;color:var(--text2);margin-bottom:2px;}
.apo-title{font-size:13px;font-weight:500;}
.apo-sub{font-size:11px;color:var(--text2);margin-top:2px;}
.add-apo-btn{background:var(--text);color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;width:100%;margin-bottom:10px;}
.todo-day-list{display:flex;flex-direction:column;gap:5px;}
.todo-item{display:flex;align-items:center;gap:8px;background:var(--surface);border-radius:7px;padding:8px 10px;border:1px solid var(--border);}
.todo-txt{flex:1;font-size:12px;}
.todo-st{font-size:9px;padding:1px 5px;border-radius:4px;}

/* MAIL */
.mail-toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.mail-filter{display:flex;gap:4px;flex:1;overflow-x:auto;scrollbar-width:none;}
.mf-btn{flex-shrink:0;padding:4px 10px;border-radius:16px;font-size:11px;font-weight:700;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-family:'Noto Sans JP',sans-serif;}
.mf-btn.on{background:var(--text);color:#fff;border-color:var(--text);}
.mail-list{flex:1;overflow-y:auto;padding:8px;}
.mail-card{background:var(--surface);border-radius:10px;padding:11px 12px;margin-bottom:7px;box-shadow:var(--sh);cursor:pointer;border:1px solid transparent;border-left:3px solid var(--border2);transition:all .15s;}
.mail-card:hover{box-shadow:var(--sh2);}
.mail-card.unread{border-left-color:var(--blue);}
.mail-card.cat-task{border-left-color:var(--red);}
.mail-card.cat-apo{border-left-color:var(--green);}
.mail-card.cat-info{border-left-color:var(--amber);}
.mc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;}
.mc-from{font-size:12px;font-weight:700;flex:1;}
.mc-time{font-size:10px;color:var(--text3);white-space:nowrap;}
.mc-subject{font-size:13px;font-weight:500;margin-bottom:3px;line-height:1.3;}
.mc-snippet{font-size:11px;color:var(--text2);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.mc-tags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
.mc-tag{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;}
.mc-tag.tsk{background:var(--reds);color:var(--red);}
.mc-tag.apo{background:var(--greenbg);color:var(--green);}
.mc-tag.inf{background:var(--amberbg);color:var(--amber);}
.mc-tag.oth{background:var(--s3);color:var(--text2);}
.mc-tag.unr{background:var(--bluebg);color:var(--blue);}
.mc-actions{display:flex;gap:4px;margin-top:7px;}
.mc-act{flex:1;padding:5px;border-radius:6px;border:none;font-size:10px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.mc-act.a-task{background:var(--reds);color:var(--red);}
.mc-act.a-apo{background:var(--greenbg);color:var(--green);}
.mc-act.a-read{background:var(--s2);color:var(--text2);}
.mail-empty{text-align:center;padding:48px 20px;color:var(--text3);}
.mail-empty p{font-size:13px;line-height:1.7;margin-bottom:16px;}
.mail-empty button{background:var(--text);color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.mc-cat-btn{padding:6px 4px;border-radius:7px;border:1.5px solid var(--border);background:var(--s2);font-size:10px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--text2);}
.mc-cat-btn.on{border-color:var(--text);background:var(--text);color:#fff;}

/* DEV */
.dev-header{background:var(--text);padding:14px 16px;flex-shrink:0;}
.dev-header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.dev-title{font-size:15px;font-weight:700;color:#fff;}
.dev-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:2px;}
.dev-add-btn{background:var(--gold);color:var(--text);border:none;border-radius:7px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.dev-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.dev-stat{background:rgba(255,255,255,.1);border-radius:8px;padding:8px;text-align:center;}
.dev-stat-num{font-size:18px;font-weight:700;color:#fff;line-height:1;}
.dev-stat-num.done-c{color:#2ecc71;}
.dev-stat-label{font-size:9px;color:rgba(255,255,255,.5);margin-top:3px;}
.dev-filter-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;display:flex;gap:6px;flex-shrink:0;}
.dev-filter{padding:4px 12px;border-radius:16px;font-size:11px;font-weight:700;border:1px solid var(--border);background:transparent;cursor:pointer;color:var(--text2);font-family:'Noto Sans JP',sans-serif;}
.dev-filter.on{background:var(--text);color:#fff;border-color:var(--text);}
.dev-list{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px;}
.dev-card{background:var(--surface);border-radius:10px;box-shadow:var(--sh);overflow:hidden;border:1px solid transparent;transition:border-color .15s;}
.dev-card:hover{border-color:var(--border);}
.dev-card.dev-done{opacity:.55;}
.dev-card-head{padding:11px 12px;display:flex;align-items:flex-start;gap:9px;}
.dev-card-chk{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.dev-card-chk:hover{border-color:#2ecc71;}
.dev-card.dev-done .dev-card-chk{background:#2ecc71;border-color:#2ecc71;}
.dev-chki{display:none;}.dev-card.dev-done .dev-chki{display:block;}
.dev-card-body{flex:1;}
.dev-card-title{font-size:13px;font-weight:700;line-height:1.4;margin-bottom:4px;}
.dev-card.dev-done .dev-card-title{text-decoration:line-through;color:var(--text2);}
.dev-card-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.dev-priority{font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;}
.dev-p-now{background:var(--reds);color:var(--red);}
.dev-p-plan{background:var(--amberbg);color:var(--amber);}
.dev-p-later{background:var(--s3);color:var(--text2);}
.dev-due{font-size:9px;color:var(--text3);}
.dev-due.ov{color:var(--red);font-weight:700;}
.dev-due.td{color:var(--amber);font-weight:700;}
.dev-memo{font-size:11px;color:var(--text2);line-height:1.5;margin-top:4px;}
.dev-expand-btn{font-size:11px;color:var(--text3);cursor:pointer;border:none;background:none;padding:0;margin-left:auto;flex-shrink:0;}
.dev-subs{border-top:1px solid var(--border);padding:8px 12px 10px 39px;display:flex;flex-direction:column;gap:5px;background:var(--s2);}
.dev-sub-item{display:flex;align-items:center;gap:7px;}
.dev-sub-chk{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.dev-sub-item.sdone .dev-sub-chk{background:#2ecc71;border-color:#2ecc71;}
.dev-sub-chki{display:none;}.dev-sub-item.sdone .dev-sub-chki{display:block;}
.dev-sub-txt{font-size:12px;color:var(--text);}
.dev-sub-item.sdone .dev-sub-txt{text-decoration:line-through;color:var(--text2);}
.dev-sub-add{display:flex;gap:5px;margin-top:4px;}
.dev-sub-add input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 9px;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--text);outline:none;}
.dev-sub-add button{background:var(--text);color:#fff;border:none;border-radius:6px;padding:0 10px;font-size:13px;cursor:pointer;}
.dev-progress{height:3px;background:var(--border);margin:0 12px 8px;}
.dev-progress-fill{height:100%;background:#2ecc71;border-radius:1px;transition:width .3s;}
.dev-progress-fill.partial{background:var(--amber);}
.dev-empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px;}

/* SETTINGS */
.settings-page{padding:16px;flex:1;overflow-y:auto;}
.settings-section{background:var(--surface);border-radius:10px;padding:14px;margin-bottom:12px;box-shadow:var(--sh);}
.settings-title{font-size:12px;font-weight:700;color:var(--text2);letter-spacing:.06em;margin-bottom:10px;}
.status-ok{color:var(--green);font-weight:700;}
.status-ng{color:var(--red);font-weight:700;}

/* OVERLAYS */
.overlay{display:none;position:fixed;inset:0;background:rgba(20,18,14,.55);backdrop-filter:blur(3px);z-index:300;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:520px;padding:18px 18px 44px;animation:up .2s ease;max-height:88vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
@media(max-width:768px){.sheet{max-height:80vh;}}
@keyframes up{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}
.handle{width:30px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 14px;}
.stitle{font-size:15px;font-weight:700;margin-bottom:14px;}
.flbl{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.05em;display:block;margin-bottom:4px;}
.finp{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:10px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none;}
.finp:focus{border-color:var(--blue);}
.finp::placeholder{color:var(--text3);}
.frow2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.frow2 .finp{margin-bottom:0;}
.st-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.stsel{padding:9px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--s2);cursor:pointer;text-align:center;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
.stsel .stn{font-size:11px;font-weight:700;display:block;}
.stsel.on{border-color:var(--blue);background:var(--bluebg);}.stsel.on .stn{color:var(--blue);}
.sub-row{display:flex;gap:6px;margin-bottom:6px;}
.sub-fi{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--text);outline:none;}
.sub-fi::placeholder{color:var(--text3);}
.sub-ab{background:var(--text);color:#fff;border:none;border-radius:7px;padding:0 11px;font-size:14px;cursor:pointer;}
.sub-list{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.sub-fi-item{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 9px;}
.sub-fi-item span{flex:1;font-size:12px;}
.sub-del{font-size:15px;color:var(--text3);cursor:pointer;border:none;background:none;}
.btn-row{display:flex;gap:7px;margin-top:8px;}
.btn{flex:1;padding:10px;border-radius:8px;border:none;font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.btn-p{background:var(--text);color:#fff;}
.btn-g{background:var(--s2);color:var(--text2);border:1px solid var(--border);}
.btn-d{background:var(--reds);color:var(--red);border:1px solid #f5c5c2;}
.dbadge{display:inline-block;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:700;margin-bottom:10px;}
.drow{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.drow:last-of-type{border-bottom:none;}
.dkey{font-size:10px;font-weight:700;color:var(--text3);width:72px;flex-shrink:0;padding-top:1px;}
.dval{color:var(--text);line-height:1.5;flex:1;}
.sub-det-list{display:flex;flex-direction:column;gap:4px;margin:8px 0;}
.sdi{display:flex;align-items:center;gap:7px;background:var(--s2);border-radius:7px;padding:7px 9px;border:1px solid var(--border);}
.sdi.dsd{opacity:.5;}.sdi.dsd .sdit{text-decoration:line-through;color:var(--text2);}
.sdc{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.sdi.dsd .sdc{background:#2ecc71;border-color:#2ecc71;}
.sdci{display:none;}.sdi.dsd .sdci{display:block;}
.sdit{flex:1;font-size:12px;}
.sdd{font-size:14px;color:var(--text3);cursor:pointer;border:none;background:none;}
.sub-add-row{display:flex;gap:6px;}
.sub-add-row input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:7px;padding:7px 10px;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--text);outline:none;}
.sub-add-row button{background:var(--text);color:#fff;border:none;border-radius:7px;padding:0 13px;font-size:14px;cursor:pointer;}
.move-st-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:8px 0;}
.mv-btn{padding:8px;border-radius:7px;border:1px solid var(--border);background:var(--s2);font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans JP',sans-serif;color:var(--text2);}
.mv-btn.cur{opacity:.4;cursor:default;}
.mail-det-subj{font-size:15px;font-weight:700;margin-bottom:12px;line-height:1.4;}
.mail-det-meta{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.6;}
.mail-det-body{font-size:13px;line-height:1.7;color:var(--text);background:var(--s2);border-radius:8px;padding:12px;margin-bottom:12px;white-space:pre-wrap;max-height:260px;overflow-y:auto;}
.mail-ai-tag{display:flex;align-items:center;gap:6px;background:var(--purplebg);border-radius:8px;padding:8px 10px;margin-bottom:10px;}
.mail-ai-tag span{font-size:12px;color:var(--purple);}

/* ── スマホ用ステータスタブ ── */
.st-tabs{display:none;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.st-tab-list{display:flex;}
.st-tab{flex:1;padding:10px 4px 9px;font-size:10px;font-weight:700;border:none;background:none;cursor:pointer;color:var(--text2);border-bottom:3px solid transparent;font-family:'Noto Sans JP',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px;transition:all .15s;}
.st-tab .st-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.st-tab.t-todo    .st-dot{background:#e74c3c;}
.st-tab.t-doing   .st-dot{background:#1d5fa8;}
.st-tab.t-maker   .st-dot{background:#b07010;}
.st-tab.t-customer .st-dot{background:#1a7a4a;}
.st-tab.active.t-todo    {border-bottom-color:#c0392b;color:#c0392b;}
.st-tab.active.t-doing   {border-bottom-color:#1d5fa8;color:#1d5fa8;}
.st-tab.active.t-maker   {border-bottom-color:#b07010;color:#b07010;}
.st-tab.active.t-customer{border-bottom-color:#1a7a4a;color:#1a7a4a;}
.st-cnt{font-size:9px;background:#e74c3c;color:#fff;border-radius:8px;padding:1px 5px;font-weight:700;min-width:16px;text-align:center;}
.sp-board{display:none;flex:1;overflow-y:auto;padding:10px;flex-direction:column;gap:6px;}

@media(max-width:768px){
  .kanban-wrap{display:none !important;}
  .st-tabs{display:block;}
  .sp-board{display:flex;}
}
</style>
</head>

<script>
const SK='enkou_v4';
const SRC={tel:{icon:'📞',label:'電話',tc:'ctag-tel'},mail:{icon:'✉️',label:'メール',tc:'ctag-mail'},visit:{icon:'🚗',label:'商談/訪問',tc:'ctag-visit'},ins:{icon:'📋',label:'社内指示',tc:'ctag-ins'},self:{icon:'💡',label:'自分発',tc:'ctag-self'}};
const STATUSES={todo:{label:'未対応',color:'#c0392b',bg:'#fff1f0'},doing:{label:'対応中',color:'#1d5fa8',bg:'#e8f2fb'},maker:{label:'メーカー確認中',color:'#b07010',bg:'#fdf4e0'},customer:{label:'お客様確認中',color:'#1a7a4a',bg:'#e4f5ed'}};
const DEV_KW=['開発','アプリ','API','Flask','SQLite','Gmail','GitHub','Supabase','Claude','Anthropic'];

let tasks=[],apos=[],mails=[],formSubs=[];
let curSrc='tel',curSt='todo',selTaskId=null,selMailId=null;
let mailFilter='all',weekOffset=0,selDay_=null;
let devFilter='all',expandedDevIds=new Set();

function renderSpBoard(){
  const sales=getSalesTasks();
  const items=sales.filter(t=>t.st===curSpTab||(!t.st&&curSpTab==='todo'));
  const active=items.filter(t=>!t.done);
  const done=items.filter(t=>t.done);
  const isExp=expandedCols[curSpTab];
  const isDoneOpen=expandedDone[curSpTab];
  const shown=isExp?active:active.slice(0,SHOW_LIMIT);
  const st=STATUSES[curSpTab];

  let html='';
  if(!active.length&&!done.length){
    html=`<div class="kempty">タスクなし</div>`;
  } else {
    html+=shown.map(t=>taskCardHtml(t)).join('');
    if(active.length>SHOW_LIMIT&&!isExp){
      html+=`<button class="more-btn" onclick="expandCol('${curSpTab}')">＋ あと${active.length-SHOW_LIMIT}件を表示</button>`;
    } else if(isExp&&active.length>SHOW_LIMIT){
      html+=`<button class="more-btn" onclick="collapseCol('${curSpTab}')">▲ 折りたたむ</button>`;
    }
    if(done.length){
      html+=`<button class="done-toggle" onclick="toggleDoneSection('${curSpTab}')"><span>✓ 完了済み ${done.length}件</span><span>${isDoneOpen?'▲':'▼'}</span></button>`;

  }

}

function dueChip(t){
  if(!t.due)return'';const td=todayStr();
  if(t.done)return`<span class="cdue">${fmtDate(t.due)}</span>`;
  if(t.due<td)return`<span class="cdue ov">期限切れ</span>`;
  if(t.due===td)return`<span class="cdue td">本日</span>`;
  return`<span class="cdue">${fmtDate(t.due)}</span>`;
}
function subStats(t){if(!t.subs||!t.subs.length)return null;const done=t.subs.filter(s=>s.done).length;return{done,total:t.subs.length};}

function taskCardHtml(t,isDragEnabled=true){
  const s=SRC[t.src]||SRC.self;
  const ss=subStats(t);
  let bar='';
  if(ss){const pct=Math.round(ss.done/ss.total*100);const al=ss.done===ss.total;bar=`<div class="spb"><div class="spbw"><div class="spbf${al?'':' pt'}" style="width:${pct}%"></div></div><span class="spbc${al?' al':''}">${ss.done}/${ss.total}</span></div>`;}
  const stBtns=Object.entries(STATUSES).map(([k,v])=>`<button class="smv${t.st===k?' active-st':''}" ${t.st===k?'disabled':''} onclick="event.stopPropagation();moveStatus('${t.id}','${k}')" style="${t.st!==k?`background:${v.bg};color:${v.color};border-color:${v.color};`:''}">${v.label}</button>`).join('');
  return`<div class="tcard${t.done?' done':''}" id="tc_${t.id}" draggable="${isDragEnabled&&!t.done}" onclick="openTaskDet('${t.id}')"
    data-id="${t.id}"
    ondragstart="onDragStart(event,'${t.id}')"
    ondragend="onDragEnd(event)">
    <div class="tr1">
      <span class="tbadge">${s.icon}</span>
      <div class="tct">${esc(t.title)}</div>
      <div class="tchk" onclick="event.stopPropagation();toggleTask('${t.id}')">
        <svg class="chki" width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5.5L7 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>
    <div class="tr2">
      <span class="ctag ${s.tc}">${esc(s.label)}</span>
      ${t.cust?`<span class="ccust">${esc(t.cust)}</span>`:''}
      ${dueChip(t)}
    </div>
    ${bar}
    ${t.done?'':`<div class="status-move">${stBtns}</div>`}
  </div>`;
}

function toggleTask(id){const t=tasks.find(t=>t.id===id);if(t){t.done=!t.done;save();renderTasks();}}
function moveStatus(id,st){const t=tasks.find(t=>t.id===id);if(t){t.st=st;save();renderTasks();showToast(`→ ${STATUSES[st].label}`);}}
let dragId=null,longPressTimer=null;

function onDragStart(e,id){
  dragId=id;
  e.dataTransfer.effectAllowed='move';
  setTimeout(()=>{const el=document.getElementById('tc_'+id);if(el)el.classList.add('dragging');},0);
}
function onDragEnd(e){
  dragId=null;
  document.querySelectorAll('.tcard.dragging').forEach(el=>el.classList.remove('dragging'));
  document.querySelectorAll('.kanban-col.drag-over').forEach(el=>el.classList.remove('drag-over'));
}

function setupDropZones(){
  document.querySelectorAll('.kanban-col').forEach(col=>{
    const st=col.id.replace('col-','');
    col.addEventListener('dragover',e=>{e.preventDefault();col.classList.add('drag-over');});
    col.addEventListener('dragleave',e=>{if(!col.contains(e.relatedTarget))col.classList.remove('drag-over');});
    col.addEventListener('drop',e=>{
      e.preventDefault();col.classList.remove('drag-over');
      if(dragId&&st){moveStatus(dragId,st);dragId=null;}
    });
  });

  // スマホ長押しドラッグ（Touch Events）
  document.querySelectorAll('.tcard[draggable="true"]').forEach(card=>{
    card.addEventListener('touchstart',e=>{
      const id=card.dataset.id;
      longPressTimer=setTimeout(()=>{
        card.classList.add('dragging');
        setupTouchDrag(card,id);
      },500);
    },{passive:true});
    card.addEventListener('touchend',()=>{clearTimeout(longPressTimer);card.classList.remove('dragging');});
    card.addEventListener('touchmove',()=>{clearTimeout(longPressTimer);},{passive:true});
  });
}

function setupTouchDrag(card,id){
  let clone=null;
  function onMove(e){
    e.preventDefault();
    const touch=e.touches[0];
    if(!clone){
      clone=card.cloneNode(true);
      clone.style.cssText=`position:fixed;width:${card.offsetWidth}px;opacity:.8;z-index:9999;pointer-events:none;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.2);`;
      document.body.appendChild(clone);
    }
    clone.style.left=(touch.clientX-card.offsetWidth/2)+'px';
    clone.style.top=(touch.clientY-30)+'px';
    // ドロップ先を探す
    clone.style.display='none';
    const el=document.elementFromPoint(touch.clientX,touch.clientY);
    clone.style.display='';
    if(el){
      document.querySelectorAll('.kanban-col.drag-over').forEach(c=>c.classList.remove('drag-over'));
      const col=el.closest('.kanban-col');
      if(col)col.classList.add('drag-over');
    }
  }
  function onEnd(e){
    clearTimeout(longPressTimer);
    if(clone){clone.remove();clone=null;}
    card.classList.remove('dragging');
    document.querySelectorAll('.kanban-col.drag-over').forEach(col=>{
      col.classList.remove('drag-over');
      const st=col.id.replace('col-','');
      moveStatus(id,st);
    });
    document.removeEventListener('touchmove',onMove);
    document.removeEventListener('touchend',onEnd);
  }
  document.addEventListener('touchmove',onMove,{passive:false});
  document.addEventListener('touchend',onEnd);
}

  const devTasks=getDevTasks();
  const total=devTasks.length,done=devTasks.filter(t=>t.done).length,urg=devTasks.filter(t=>!t.done&&t.st==='todo').length,plan=devTasks.filter(t=>!t.done&&t.st==='doing').length;
  document.getElementById('devStats').innerHTML=`<div class="dev-stat"><div class="dev-stat-num">${total}</div><div class="dev-stat-label">合計</div></div><div class="dev-stat"><div class="dev-stat-num done-c">${done}</div><div class="dev-stat-label">完了</div></div><div class="dev-stat"><div class="dev-stat-num" style="color:#f87171">${urg}</div><div class="dev-stat-label">未着手</div></div><div class="dev-stat"><div class="dev-stat-num" style="color:#fcd34d">${plan}</div><div class="dev-stat-label">作業中</div></div>`;
  const rem=devTasks.filter(t=>!t.done).length;const badge=document.getElementById('dev-badge');badge.textContent=rem;badge.style.display=rem>0?'':'none';
  let filtered=devTasks;
  if(devFilter==='todo')filtered=devTasks.filter(t=>!t.done);
  if(devFilter==='done')filtered=devTasks.filter(t=>t.done);
  const list=document.getElementById('devList');
  if(!filtered.length){list.innerHTML=`<div class="dev-empty">タスクなし<br><br><button style="background:var(--text);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;" onclick="addDevTasks()">🛠 開発タスクを一括登録</button></div>`;return;}
  list.innerHTML=[...filtered.filter(t=>!t.done),...filtered.filter(t=>t.done)].map(devCardHtml).join('');
}
function devCardHtml(t){
  const subs=t.subs||[],dc=subs.filter(s=>s.done).length;
  const pct=subs.length?Math.round(dc/subs.length*100):0,allDone=subs.length>0&&dc===subs.length;
  const pCls=t.q===1?'dev-p-now':t.q===2?'dev-p-plan':'dev-p-later';
  const pLbl=t.q===1?'今すぐ':t.q===2?'計画':'後回し';
  const td=todayStr();
  let dueHtml='';if(t.due){const cls=t.due<td?'ov':t.due===td?'td':'';const lbl=t.due<td?`期限切れ`:t.due===td?'本日':fmtDate(t.due);dueHtml=`<span class="dev-due ${cls}">📅 ${lbl}</span>`;}
  const expanded=expandedDevIds.has(t.id);
  const subItems=subs.map(sub=>`<div class="dev-sub-item${sub.done?' sdone':''}"><div class="dev-sub-chk" onclick="toggleDevSub('${t.id}','${sub.id}')"><svg class="dev-sub-chki" width="7" height="5" viewBox="0 0 7 5" fill="none"><path d="M1 2.5L2.8 4.5L6 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span class="dev-sub-txt">${esc(sub.text)}</span></div>`).join('');
  return`<div class="dev-card${t.done?' dev-done':''}" id="dc_${t.id}">
    <div class="dev-card-head">
      <div class="dev-card-chk" onclick="event.stopPropagation();toggleTask('${t.id}');renderDev();">
        <svg class="dev-chki" width="8" height="6" viewBox="0 0 8 6" fill="none"><path d="M1 3L3 5.5L7 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="dev-card-body">
        <div class="dev-card-title">${esc(t.title)}</div>
        <div class="dev-card-meta"><span class="dev-priority ${pCls}">${pLbl}</span>${dueHtml}${subs.length?`<span style="font-size:9px;color:${allDone?'#2ecc71':'var(--text3)'};">${dc}/${subs.length}</span>`:''}</div>
        ${t.memo?`<div class="dev-memo">${esc(t.memo)}</div>`:''}
      </div>
      ${subs.length?`<button class="dev-expand-btn" onclick="toggleDevExpand('${t.id}')">${expanded?'▲':'▼'}</button>`:''}
    </div>
    ${subs.length?`<div class="dev-progress"><div class="dev-progress-fill${allDone?'':' partial'}" style="width:${pct}%"></div></div>`:''}
    ${expanded?`<div class="dev-subs">${subItems}<div class="dev-sub-add"><input id="dsa_${t.id}" type="text" placeholder="サブタスクを追加…"><button onclick="addDevSubTask('${t.id}')">＋</button></div></div>`:''}
  </div>`;
}
function toggleDevExpand(id){if(expandedDevIds.has(id))expandedDevIds.delete(id);else expandedDevIds.add(id);renderDev();}
function toggleDevSub(tid,sid){const t=tasks.find(t=>t.id===tid);if(!t)return;const s=(t.subs||[]).find(s=>s.id===sid);if(s){s.done=!s.done;save();renderDev();}}
function addDevSubTask(tid){const inp=document.getElementById('dsa_'+tid);if(!inp)return;const v=inp.value.trim();if(!v)return;const t=tasks.find(t=>t.id===tid);if(!t)return;if(!t.subs)t.subs=[];t.subs.push({id:uid(),text:v,done:false});inp.value='';save();renderDev();expandedDevIds.add(tid);setTimeout(()=>{const ni=document.getElementById('dsa_'+tid);if(ni)ni.focus();},50);}
function setDevFilter(f,btn){devFilter=f;document.querySelectorAll('.dev-filter').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderDev();}
function openDevCapture(){openCapture('self');setTimeout(()=>{curSt='todo';document.querySelectorAll('.stsel').forEach(b=>b.classList.toggle('on',b.dataset.st==='todo'));},150);}

/* SCHEDULE */
function getWeekDates(offset=0){const d=new Date();d.setDate(d.getDate()-d.getDay()+1+offset*7);return Array.from({length:7},(_,i)=>{const dd=new Date(d);dd.setDate(d.getDate()+i);return dd.toISOString().slice(0,10);});}
function moveWeek(dir){if(dir===0)weekOffset=0;else weekOffset+=dir;renderSched();}
function renderSched(){
  const days=getWeekDates(weekOffset),td=todayStr();
  const[y,m]=days[0].split('-');
  document.getElementById('weekLabel').textContent=`${+y}年${+m}月`;
  const DN=['月','火','水','木','金','土','日'];
  document.getElementById('weekGrid').innerHTML=days.map((d,i)=>{
    const isToday=d===td,num=+d.split('-')[2];
    const dayEvts=[
      ...apos.filter(a=>a.date===d).map(a=>`<div class="wday-evt ${a.type}" title="${esc(a.title)}">${fmtTime(a.start)} ${esc(a.title)}</div>`),
      ...tasks.filter(t=>!t.done&&t.due===d&&t.st==='todo').map(t=>`<div class="wday-evt" style="background:#fff1f0;color:#c0392b;">🔴 ${esc(t.title)}</div>`),
    ];
    const shown=dayEvts.slice(0,2);if(dayEvts.length>2)shown.push(`<div class="wday-evt more">+${dayEvts.length-2}</div>`);
    return`<div class="wday${isToday?' today':''}" onclick="selectDay('${d}')" style="${selDay_===d?'outline:2px solid var(--blue);':''}">
      ${isToday?`<div class="wday-circle">${num}</div>`:`<div class="wday-name">${DN[i]}</div><div class="wday-num">${num}</div>`}
      <div class="wday-events">${shown.join('')}</div>
    </div>`;
  }).join('');
  if(!selDay_)selDay_=td;
  renderDayDetail(selDay_);
}
function selectDay(d){selDay_=d;renderSched();}
function renderDayDetail(d){
  const det=document.getElementById('dayDetail');
  const[y,m,dd]=d.split('-');
  const dow=['日','月','火','水','木','金','土'][new Date(d).getDay()];
  const dayApos=apos.filter(a=>a.date===d).sort((a,b)=>a.start.localeCompare(b.start));
  const dayTasks=tasks.filter(t=>!t.done&&t.due===d);
  const apoHtml=dayApos.length?dayApos.map(a=>`<div class="apo-item${a.type==='visit'?' visit-apo':a.type==='tel'?' tel-apo':''}"><div class="apo-time">${fmtTime(a.start)}${a.end?` – ${fmtTime(a.end)}`:''}</div><div class="apo-title">${a.type==='visit'?'🚗':a.type==='tel'?'📞':'📅'} ${esc(a.title)}</div>${a.place?`<div class="apo-sub">📍 ${esc(a.place)}</div>`:''}${a.memo?`<div class="apo-sub">📝 ${esc(a.memo)}</div>`:''}</div>`).join(''):'<div style="font-size:12px;color:var(--text3);margin-bottom:10px;">予定なし</div>';
  const todoHtml=dayTasks.length?dayTasks.map(t=>{const stInfo=STATUSES[t.st||'todo'];return`<div class="todo-item"><span class="todo-txt">${(SRC[t.src]||SRC.self).icon} ${esc(t.title)}</span><span class="todo-st" style="background:${stInfo.bg};color:${stInfo.color};">${stInfo.label}</span></div>`;}).join(''):'<div style="font-size:12px;color:var(--text3);">期限タスクなし</div>';
  det.innerHTML=`<div class="day-detail-title">${+y}年${+m}月${+dd}日（${dow}）</div><div class="apo-list">${apoHtml}</div><button class="add-apo-btn" onclick="openApo('${d}')">＋ アポ・予定を追加</button><div style="font-size:11px;font-weight:700;color:var(--text2);letter-spacing:.06em;margin-bottom:6px;">本日のタスク</div><div class="todo-day-list">${todoHtml}</div>`;
}
function openApo(date=''){
  ['apo_title','apo_place','apo_memo'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('apo_date').value=date||todayStr();
  document.getElementById('apo_type').value='visit';
  document.getElementById('apo_start').value='10:00';
  document.getElementById('apo_end').value='11:00';
  openOv('apoOv');
}
function openApoDetail(id){
  const a=apos.find(a=>a.id===id);if(!a)return;
  document.getElementById('taskDetSheet').innerHTML=`<div class="handle"></div><div style="font-size:15px;font-weight:700;margin-bottom:12px;">${a.type==='visit'?'🚗':a.type==='tel'?'📞':'📅'} ${esc(a.title)}</div><div class="drow"><span class="dkey">日付</span><span class="dval">${fmtDate(a.date)}</span></div><div class="drow"><span class="dkey">時刻</span><span class="dval">${fmtTime(a.start)}${a.end?` – ${fmtTime(a.end)}`:''}</span></div>${a.place?`<div class="drow"><span class="dkey">場所</span><span class="dval">${esc(a.place)}</span></div>`:''}${a.memo?`<div class="drow"><span class="dkey">メモ</span><span class="dval">${esc(a.memo)}</span></div>`:''}<div class="btn-row" style="margin-top:14px;"><button class="btn btn-d" onclick="deleteApo('${a.id}')">削除</button><button class="btn btn-g" onclick="closeOv('taskDetOv')">閉じる</button></div>`;
  openOv('taskDetOv');
}
function saveApo(){
  const title=document.getElementById('apo_title').value.trim();if(!title){document.getElementById('apo_title').focus();return;}
  apos.push({id:uid(),type:document.getElementById('apo_type').value,date:document.getElementById('apo_date').value,start:document.getElementById('apo_start').value,end:document.getElementById('apo_end').value,title,place:document.getElementById('apo_place').value.trim(),memo:document.getElementById('apo_memo').value.trim()});
  save();closeOv('apoOv');renderSched();
}
function deleteApo(id){if(!confirm('削除しますか？'))return;apos=apos.filter(a=>a.id!==id);save();closeOv('taskDetOv');renderSched();}

/* MAIL */
function classifyMail(m){const txt=(m.subject+' '+(m.snippet||'')).toLowerCase();if(/見積|依頼|確認|お願い|回答/.test(txt))return'task';if(/訪問|打合|日程|アポ|面談/.test(txt))return'apo';if(/お知らせ|ニュース|案内|newsletter/.test(txt))return'info';return'other';}
function catTag(cat){const m={task:`<span class="mc-tag tsk">🔴 要対応</span>`,apo:`<span class="mc-tag apo">🟢 アポ関連</span>`,info:`<span class="mc-tag inf">🟡 情報</span>`,other:`<span class="mc-tag oth">その他</span>`};return m[cat]||m.other;}
function setMailFilter(f,btn){mailFilter=f;document.querySelectorAll('.mf-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');renderMailList();}
function renderMailList(){
  const list=document.getElementById('mailList');
  let filtered=mails.filter(m=>{if(mailFilter==='all')return true;if(mailFilter==='unread')return m.unread;return m.cat===mailFilter;});
  if(!filtered.length){list.innerHTML=`<div class="mail-empty"><p>メールがありません。<br>Gmailで受け取ったメールの要点を<br>手入力で管理できます。</p><button onclick="openAddMail()">＋ メールを追加</button></div>`;return;}
  list.innerHTML=[...filtered].sort((a,b)=>b.created-(a.created||0)).map(m=>`<div class="mail-card${m.unread?' unread':''} cat-${m.cat}" onclick="openMailDet('${m.id}')"><div class="mc-top"><span class="mc-from">${esc(m.from)}</span><span class="mc-time">${esc(m.date_label)}</span></div><div class="mc-subject">${m.unread?'<b>':''}${esc(m.subject)}${m.unread?'</b>':''}</div><div class="mc-snippet">${esc(m.snippet)}</div><div class="mc-tags">${catTag(m.cat)}${m.unread?'<span class="mc-tag unr">未読</span>':''}</div><div class="mc-actions"><button class="mc-act a-task" onclick="event.stopPropagation();mailToTask('${m.id}')">📋 タスク化</button><button class="mc-act a-apo" onclick="event.stopPropagation();mailToApo('${m.id}')">📅 アポ化</button><button class="mc-act a-read" onclick="event.stopPropagation();markRead('${m.id}')">✓ 既読</button></div></div>`).join('');
  const unread=mails.filter(m=>m.unread).length;const badge=document.getElementById('mail-badge');badge.textContent=unread;badge.style.display=unread>0?'':'none';
}
function openAddMail(){
  curMailCat='task';
  ['am_from','am_subj','am_body'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('am_unread').checked=true;
  document.querySelectorAll('.mc-cat-btn').forEach(b=>b.classList.toggle('on',b.dataset.c==='task'));
  openOv('addMailOv');setTimeout(()=>document.getElementById('am_from').focus(),250);
}
function pickMailCat(c,btn){curMailCat=c;document.querySelectorAll('.mc-cat-btn').forEach(b=>b.classList.toggle('on',b===btn));}
function saveManualMail(){
  const from=document.getElementById('am_from').value.trim(),subj=document.getElementById('am_subj').value.trim();
  if(!subj){document.getElementById('am_subj').focus();return;}
  const now=new Date(),label=`${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
  const body=document.getElementById('am_body').value.trim();
  mails.unshift({id:uid(),from:from||'（不明）',subject:subj,snippet:body,body,date_label:label,unread:document.getElementById('am_unread').checked,cat:curMailCat,created:Date.now()});
  saveMails();renderMailList();closeOv('addMailOv');showToast('メールを追加しました');
}
function openMailDet(id){
  selMailId=id;const m=mails.find(m=>m.id===id);if(!m)return;
  m.unread=false;saveMails();renderMailList();
  const catLabel={task:'🔴 要対応',apo:'🟢 アポ関連',info:'🟡 情報',other:'その他'}[m.cat]||'その他';
  document.getElementById('mailDetSheet').innerHTML=`<div class="handle"></div><div class="mail-det-subj">${esc(m.subject)}</div><div class="mail-det-meta">差出人: ${esc(m.from)}<br>日時: ${esc(m.date_label)}</div><div class="mail-ai-tag"><span>分類：${catLabel}</span></div>${m.body?`<div class="mail-det-body">${esc(m.body)}</div>`:''}<div class="btn-row"><button class="btn btn-p" onclick="mailToTask('${m.id}');closeOv('mailDetOv')">📋 タスク化</button><button class="btn" style="background:var(--greenbg);color:var(--green);flex:1;" onclick="mailToApo('${m.id}');closeOv('mailDetOv')">📅 アポ化</button><button class="btn btn-d" onclick="deleteMail('${m.id}')">削除</button></div><div class="btn-row" style="margin-top:6px;"><button class="btn btn-g" onclick="closeOv('mailDetOv')">閉じる</button></div>`;
  openOv('mailDetOv');
}
function mailToTask(id){const m=mails.find(m=>m.id===id);if(!m)return;tasks.unshift({id:uid(),src:'mail',title:m.subject,cust:m.from,due:todayStr(),st:'todo',memo:m.body?m.body.slice(0,80):'メールより',done:false,subs:[],created:Date.now()});save();renderTasks();showToast('タスクに追加しました');}
function mailToApo(id){const m=mails.find(m=>m.id===id);if(!m)return;document.getElementById('apo_title').value=m.subject;document.getElementById('apo_place').value=m.from;document.getElementById('apo_date').value=todayStr();document.getElementById('apo_type').value='gcal';document.getElementById('apo_start').value='10:00';document.getElementById('apo_end').value='11:00';document.getElementById('apo_memo').value=m.body?m.body.slice(0,100):'';closeOv('mailDetOv');openOv('apoOv');}
function markRead(id){const m=mails.find(m=>m.id===id);if(m){m.unread=false;saveMails();renderMailList();}}
function deleteMail(id){if(!confirm('削除しますか？'))return;mails=mails.filter(m=>m.id!==id);saveMails();renderMailList();closeOv('mailDetOv');}

/* OVERLAY */
function openOv(id){document.getElementById(id).classList.add('open');}
function closeOv(id){document.getElementById(id).classList.remove('open');}
document.addEventListener('click',e=>{document.querySelectorAll('.overlay.open').forEach(o=>{if(e.target===o)o.classList.remove('open');});});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open'));
  if(e.key==='Enter'){
    if(document.getElementById('captureOv').classList.contains('open')){if(document.activeElement===document.getElementById('sub_inp')){addFormSub();return;}saveCapture();}
    if(document.getElementById('taskDetOv').classList.contains('open')){if(document.activeElement===document.getElementById('det_sub_inp'))addDetSub();}
  }
});

function showToast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1c1a16;color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2000);}

load();loadMailsFromStorage();loadApiKey();renderTasks();renderSched();showTab('task');
</script>
